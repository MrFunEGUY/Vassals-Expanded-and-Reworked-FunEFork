 ##### Subject types #####

preset_ver_foederatus: "同盟军"
preset_ver_foederatus_desc:"同盟军与其宗主建立军事同盟关系，双方需参与彼此的战争。定期的联合军演可提升双方武装力量效能。\n\n§Y补贴§!: §R5%§! £alloys£ §H合金§!\n§W特殊效果:§! \n§Y附庸§!: £mod_ship_damage_mult£ 舰船武器伤害: §G+10%§!，£navy_size£ 海军容量: §G+25%§!\n§Y宗主§!: £mod_ship_damage_mult£ 舰船武器伤害: §G+2%§!，£navy_size£ 海军容量: §R-2%§!"

preset_ver_satellite: "卫星国"
preset_ver_satellite_desc:"卫星国的外交活动受限且实质上被解除武装，其残余重工业用于增强宗主军事实力。\n\n§Y贡赋§!: §G15%§! £alloys£ §H合金§!\n§W特殊效果:§! \n§Y附庸§!: £navy_size£ 海军容量: §R-50%§!\n§Y宗主§!: £navy_size£ 海军容量: §G+2%§!"

preset_ver_jrpartner: "次级伙伴国"
preset_ver_jrpartner_desc:"次级伙伴国协助宗主进行科研。\n\n§Y贡赋§!: §G10%§! £society_research£ £engineering_research£ £physics_research£ §H研究§!\n§Y补贴§!: §R10%§! £exotic_gases£ §H稀有气体§!\n§W特殊效果:§! \n§Y附庸§!: 已知宗主科技研究成本 §G-85%§!\n§Y宗主§!: 研究速度: §G+2%§!"

preset_ver_dependency: "附属宣传区"
preset_ver_dependency_desc:"附属宣传区负责为宗主生产本土宣传内容。\n\n§Y贡赋§!: §G15%§! £unity£ §H凝聚力§!\n§Y补贴§!: §R5%§! £energy£ §H能源§!\n§W特殊效果:§! \n§Y宗主§!: £unity£ §H凝聚力§!: §G+2%§!"

preset_ver_clientkingdom: "附庸王国"
preset_ver_clientkingdom_desc:"附庸王国的统治者通常由宗主指定以确保忠诚。\n\n§Y补贴§!: §R10%§! £energy£ §H能源§!，§R5%§! £consumer_goods£ §H消费品§!\n§W特殊效果:§! \n§Y附庸§!: £stability£ §H稳定度§!: §R-5§!，£diplo_weight£ 外交权重: §R-50%§!\n§Y宗主§!: £stability£ §H稳定度§!: §G+3§! \n§E宗主特效§!: 永久指定附庸统治者"

preset_ver_devolved: "分权邦"
preset_ver_devolved_desc:"分权邦拥有完全内政主权。\n\n§Y贡赋§!: £influence£ §G+0.5§!\n§W特殊效果:§! \n§Y附庸§!: £happiness£ 幸福度: §G+10%§!\n§Y宗主§!: £mod_pop_government_ethic_attraction£ 主流思潮吸引力: §G+5%§!"

preset_ver_condo: "共管域"
preset_ver_condo_desc:"共管域拥有完全外交主权，作为银河外交官的中立会议场所。\n\n§W特殊效果:§! \n§Y附庸§!: £diplo_weight£ 外交权重: §G+20%§!\n§Y宗主§!: £diplo_weight£ 外交权重: §G+5%§!"

preset_ver_puppet: "傀儡国"
preset_ver_puppet_desc: "傀儡国可代宗主进行代理人战争。\n\n§Y贡赋§!: §G10%§! £energy£ §H能源§!，§G10%§! £food£ §H食物§!\n§W特殊效果:§! \n§Y附庸§!: £happiness£ 幸福度: §R-10%§!\n§Y宗主§!: £happiness£ 幸福度: §G+2%§!"

preset_ver_neocolony: "新殖民区"
preset_ver_neocolony_desc: "新殖民区经济受宗主支配。\n\n§Y贡赋§!: §G15%§! £energy£ §H能源§!\n§Y补贴§!: §R5%§! £consumer_goods£ §H消费品§!\n§W特殊效果:§! \n§Y附庸§!: £trade_value£ 贸易额: §G+10%§!，£crime£ 犯罪率: §R+30%§!\n§Y宗主§!: £trade_value£ 贸易额: §G+2%§!"

preset_ver_blood: "血邦"
preset_ver_blood_desc:"血邦需缴纳特殊贡赋——§Y血税§!。\n\n§Y贡赋§!: 每15年征收§G5%§! £pops£ §H人口§!\n§W特殊效果:§! \n§Y附庸§!: 对宗主£opinion£ §H评价§!: §R-1000§!"

preset_ver_appendage: "附属体"
preset_ver_appendage_desc:"附属体可被兼并。"

preset_ver_organic: "有机附属体"
preset_ver_organic_desc:"有机附属体无外交自由，但受宗主保护且不可兼并"

preset_ver_parallel: "并行处理器"
preset_ver_parallel_desc:"附庸与宗主的联合算力实现效率飞跃。\n§W特殊效果:§! \n宗主: 每拥有§Y$preset_ver_parallel$§!，研究速度§G+5%§!"

