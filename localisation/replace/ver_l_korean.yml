 veru.6400.name: "§Y[event_target:chosen_subject.GetName]§!의 지도층"
 veru.6400.desc: "이제 §Y[event_target:chosen_subject.GetName]§!의 통제권을 확보했으므로 우리는 우리의 통치에 순응하는 지도층을 심어야 합니다. 한 가지 방법은 그들의 사람들 중에서 우리의 통치에 호의적인 지도자를 고르는 것입니다. 그것의 장점은 권력이 아주 부드럽게 이양될 것이라는 점입니다. 하지만 우리는 우리 국민들 중에서 지도자를 임명하는 것을 선택할 수 있습니다. 그러면 그들의 충성심을 거의 확실히 얻을 수 있을 것입니다."
 veru.6400.clientkingdom: "이제 §Y[event_target:chosen_subject.GetName]§!의 통제권을 확보했으므로 우리는 우리의 통치에 순응하는 지도층을 심어야 합니다. 한 가지 방법은 그들의 사람들 중에서 우리의 통치에 호의적인 지도자를 고르는 것입니다. 아니면 우리는 우리 국민들 중에서 지도자를 임명하는 것을 선택할 수 있습니다."
 veru.6400.clientkingdom_passes: "§Y[event_target:chosen_subject.GetName]§!에 우리가 임명한 §Y[event_target:chosen_subject.GetRulerTitle]§!가 서거했습니다. 따라서 우리는 계승자를 선택해야 합니다."

 veru.6400.them: "§Y그들의§! 사람들 중에서."
 veru.6400.them.tooltip: "그들의 지도자들 중 한 명이 계승하게 한다면 §Y[event_target:chosen_subject.GetName]§!의 £stability£ §Y안정도§!와 £happiness£ §Y행복도§!가 감소하는 일을 피할 수 있습니다."
