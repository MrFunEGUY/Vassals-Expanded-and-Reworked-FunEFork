 oppressive_terms_desc:2 "우리가 지배하는 나라들은 우리보다 열등합니다. 우리가 이들을 가만히 두는 이유는, 이들이 조용히 지내며 그나마 변변치 못한 선물이라도 바치고 있기 때문입니다.\n\n§E초기 속국 협정 조건:\n$t$$subject_can_be_integrated$\n$t$$subject_can_not_do_diplomacy$\n$t$$subject_cannot_expand$\n$t$$subject_ver_ruler_anyone$\n$t$$subject_ver_government_allowed$\n$t$$subject_ver_policy_restricted$\n$t$$subject_ver_naming_allowed$\n$t$$subject_ver_capital_allowed$\n$t$지배국 전쟁 참전: 전부\n$t$종속국 전쟁 참전: 방어전\n$t$$subject_ver_proxy_allowed$\n$t$종속국 보유 자산 한도: 1§!"
 balanced_terms_desc:2 "우리 제국은 종속국을 공정하게 대우해야 한다고 믿습니다. 때가 되면, 이들도 우리 삶의 방식을 이해하고 자신들의 오류를 깨달을 것입니다.\n\n§E초기 속국 협정 조건:\n$t$$subject_can_not_be_integrated$\n$t$$subject_can_do_diplomacy_but_not_vote$\n$t$$subject_can_expand_with_tithe$\n$t$$subject_ver_ruler_them$\n$t$$subject_ver_government_allowed$\n$t$$subject_ver_policy_restricted$\n$t$$subject_ver_naming_restricted$\n$t$$subject_ver_capital_restricted$\n$t$지배국 전쟁 참전: 방어전\n$t$종속국 전쟁 참전: 방어전\n$t$$subject_ver_proxy_restricted$\n$t$종속국 보유 자산 한도: 1§!"
 benevolent_terms_desc:2 "종속국이 우리 제국의 일부인 것처럼, 우리 제국 역시 종속국의 일부입니다. 그들의 성공이 우리의 승리이며, 서로 힘을 합해 하나로 나아갈 것입니다.\n\n§E초기 속국 협정 조건:\n$t$$subject_can_not_be_integrated$\n$t$$subject_can_do_diplomacy$\n$t$$subject_can_expand$\n$t$$subject_ver_ruler_restricted$\n$t$$subject_ver_government_restricted$\n$t$$subject_ver_policy_restricted$\n$t$$subject_ver_naming_restricted$\n$t$$subject_ver_capital_restricted$\n$t$지배국 전쟁 참전: 방어전\n$t$종속국 전쟁 참전: 방어전\n$t$$subject_ver_proxy_restricted$\n$t$종속국 보유 자산 한도: 1§!"

 preset_tributary_desc:0 "조공국은 거의 독립국이나 마찬가지입니다. 최소한의 시간 내로, 그들은 그들이 원할 때 언제라도 조공 납부를 그만둘 수 있습니다.\n\n§Y공물§!: §G25%§! £energy£ §H에너지§! & £minerals£ §HMinerals§!\n§W특수 효과:§! \n§Y종속국§!: §H조공국§!에서 벗어난 형태의 계약을 맺을 수 없습니다. §H조공국§! §Y10§!년 뒤 언제라도 조공 납부를 그만둘 수 있습니다."