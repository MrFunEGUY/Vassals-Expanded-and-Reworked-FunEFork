 ##### Loyalty Events
 # Release
 veru_l.2100.name: "[event_target:demanding_subject.ruler.GetTitle] §H[event_target:demanding_subject.ruler.GetName]§!"
 veru_l.2100.loyal.desc: "§Y[event_target:demanding_subject.GetName]§!는 오랫동안 [root.GetName]의 충성스러운 속국이었습니다. 그 충성스러운 복무에 대한 보답으로, [event_target:demanding_subject.GetName]는 우리의 종속 관계의 해방을 공식적으로 요청하고 있습니다."
 veru_l.2100.disloyal.desc: "§Y[event_target:demanding_subject.GetName]§!는 [root.GetName]의 종속국으로서 오랫동안 고생해왔습니다. 우리는 이 관계가 끝날 때가 왔다고 믿으며, 우리의 종속 관계의 해방을 요청하고 있습니다."

 veru_l.2100.a: "당신들의 지위는 바뀌지 않을 것입니다."
 veru_l.2100.b: "좋아요. 당신들은 모든 의무에서 해방되었습니다."

 veru_l.2150.loyal.desc: "§Y[event_target:demanding_subject.GetName]§!는 오랫동안 [root.GetName]의 충성스러운 속국이었습니다. 그 충성스러운 복무에 대한 보답으로, [event_target:demanding_subject.GetName]는 우리의 종속 관계의 해방을 공식적으로 요구하고 있습니다. 거절하신다면, 우리는 힘으로 우리의 독립을 선언할 수밖에 없습니다."
 veru_l.2150.disloyal.desc: "§Y[event_target:demanding_subject.GetName]§!는 [root.GetName]의 종속국으로서 오랫동안 고생해왔습니다. 우리는 이 관계가 끝날 때가 왔다고 믿으며, 우리의 종속 관계의 해방을 요구하고 있습니다. 거절하신다면, 우리는 힘으로 우리의 독립을 선언할 수밖에 없습니다."

 veru_l.2150.a: "당신들의 지위는 바뀌지 않을 것입니다. 전쟁을 선포합니다."

 # Tributary
 veru_l.2200.loyal.desc: "§Y[event_target:demanding_subject.GetName]§!는 오랫동안 [root.GetName]의 충성스러운 속국이었습니다. 그 충성스러운 복무에 대한 보답으로, [event_target:demanding_subject.GetName]는 공식적으로 §Y조공국§!의 지위를 요청하고 있습니다."
