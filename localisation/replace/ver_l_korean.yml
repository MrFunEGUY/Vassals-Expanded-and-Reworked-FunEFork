 veru_l.2250.disloyal.desc: "§Y[event_target:demanding_subject.GetName]§!는 [root.GetName]의 종속국으로서 오랫동안 고생해왔습니다. 우리는 이 관계가 변할 때가 왔다고 믿으며, §Y조공국§!의 지위를 요구하고 있습니다. 거절하신다면, 우리는 힘으로 우리의 독립을 선언할 수밖에 없습니다."

