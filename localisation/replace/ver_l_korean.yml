 ##### Subject types #####

 preset_ver_foederatus: "군사조약국"
 preset_ver_foederatus_desc: "군사조약국은 지배국과 군사적 관계를 가지고 있으며, 양측 모두 상대방의 전쟁에 참여해야 합니다. 지배국과의 정기적인 합동 군사 훈련으로 양측 군대의 전투력을 향상시킵니다.\n\n§Y보조금§!: §R5%§! £alloys£ §H합금§!\n§W특수 효과:§! \n§Y종속국§!: £mod_ship_damage_mult£ 함선 피해량: §G+10%§!, £navy_size£ 함대 수용량: §G+25%§!\n§Y지배국§!: £mod_ship_damage_mult£ 함선 피해량: §G+2%§!, £navy_size£ 함대 수용량: §R-2%§!"

 preset_ver_satellite: "위성국"
 preset_ver_satellite_desc: "위성국은 대외 관계에서 제약을 받으며 사실상 무장해제된 상태입니다. 남아있는 중공업 역량은 그들의 지배국의 군사적 역량을 강화하는 데 사용됩니다.\n\n§Y공물§!: §G15%§! £alloys£ §H합금§!\n§W특수 효과:§! \n§Y종속국§!: £navy_size£ 함대 수용량: §R-50%§!\n§Y지배국§!: £navy_size£ 함대 수용량: §G+2%§!"

 preset_ver_jrpartner: "종속 동업국"
 preset_ver_jrpartner_desc: "종속 동업국은 그들의 연구 역량으로 지배국을 돕습니다.\n\n§Y공물§!: §G10%§! £society_research£ £engineering_research£ £physics_research£ §H연구§!\n§Y보조금§!: §R10%§! £exotic_gases£ §H외계 가스§!\n§W특수 효과:§! \n§Y종속국§!: 지배국이 연구한 기술의 연구 비용 §G-85%§!\n§Y지배국§!: 연구 속도: §G+2%§!"

 preset_ver_dependency: "의존국"
 preset_ver_dependency_desc: "의존국은 그들의 지배국을 위해 국내 선전물을 제작할 책임이 있습니다.\n\n§Y공물§!: §G15%§! £unity£ §H통합§!\n§Y보조금§!: §R5%§! £energy£ §H에너지§!\n§W특수 효과:§! \n§Y지배국§!: £unity£ §H통합§!: §G+2%§!"

 preset_ver_clientkingdom: "부용국"
 preset_ver_clientkingdom_desc: "부용국은 그들의 충성심을 확증하기 위해 지배국이 특별히 선택한 지도자가 통치합니다.\n\n§Y보조금§!: §R10%§! £energy£ §H에너지§!, §R5%§! £consumer_goods£ §H소비재§!\n§W특수 효과:§! \n§Y종속국§!: £stability£ §H안정도§!: §R-5§!, £diplo_weight£ 외교적 영향력: §R-50%§!\n§Y지배국§!: £stability£ §H안정도§!: §G+3§! \n§E지배국 특수 효과:§! 언제나 종속국 통치자를 선택할 수 있습니다."
 
 preset_ver_devolved: "분권 지역"
 preset_ver_devolved_desc: "분권 지역은 그들의 내정에 대해 완벽한 주권을 가집니다.\n\n§Y공물§!: £influence£ §G+0.5§!\n§W특수 효과:§! \n§Y종속국§!: £happiness£ 행복도: §G+10%§!\n§Y지배국§!: £mod_pop_government_ethic_attraction£ 통치 윤리관 선호도: §G+5%§!"

 preset_ver_condo: "공동 통치국"
 preset_ver_condo_desc: "공동 통치국은 그들의 외교에 대해서 완벽한 주권을 가집니다. 이들은 은하계 전역의 외교관들을 위한 중립 회의 장소 역할을 합니다.\n\n§W특수 효과:§! \n§Y종속국§!: £diplo_weight£ 외교적 영향력: §G+20%§!\n§Y지배국§!: £diplo_weight£ 외교적 영향력: §G+5%§!"

 preset_ver_puppet: "괴뢰국"
 preset_ver_puppet_desc: "괴뢰국들은 지배국의 대리전에 이용될 수 있습니다.\n\n§Y공물§!: §G10%§! £energy£ §H에너지§!, §G10%§! £food£ §H식량§!\n§W특수 효과:§! \n§Y종속국§!: £happiness£ 행복도: §R-10%§!\n§Y지배국§!: £happiness£ 행복도: §G+2%§!"

 preset_ver_neocolony: "신식민지"
 preset_ver_neocolony_desc: "신식민지는 지배국에게 경제적으로 지배받는 국가입니다.\n\n§Y공물§!: §G15%§! £energy£ §H에너지§!\n§Y보조금§!: §R5%§! £consumer_goods£ §H소비재§!\n§W특수 효과:§! \n§Y종속국§!: £trade_value£ 무역 가치: §G+10%§!, £crime£ 범죄율: §R+30%§!\n§Y지배국§!: £trade_value£ 무역 가치: §G+2%§!"

 preset_ver_blood: "인신 조공국"
 preset_ver_blood_desc: "인신 조공국은 §Y인신 공출§!이라는 특수한 공물을 납부합니다.\n\n§Y공물§!: 15년마다 §G5%§!의 £pops£ §H팝§!\n§W특수 효과:§! \n§Y종속국§!: §R-1000§! £opinion£ §H우호도§! towards Overlord"

 preset_ver_appendage: "부속국"
 preset_ver_appendage_desc: "부속국은 합병될 수 있습니다."

 preset_ver_organic: "유기적 보조국"
 preset_ver_organic_desc: "유기적 보조국은 외교적 자유가 없지만, 지배국에 병합될 수 없고 지배국의 보호를 받습니다."

 preset_ver_parallel: "병렬 연산 장치"
 preset_ver_parallel_desc: "종속국과 지배국의 연산 역량을 합쳐 효율성을 아주 크게 증가시킵니다.\n§W특수 효과:§! \nOverlord: 연구 속도: §Y$preset_ver_parallel$§!마다 §G+5%§!"

