 veru_l.3015.desc: "§H[tributary_that_stopped.GetName]§!에서 바쳐야 하는 조공이 도착하지 않고 있습니다. §Y[tributary_that_stopped.GetAdj]§!의 사람들은 우리의 보호를 대가로 조공을 바치는 협의가 더는 그들에게 이롭지 않으며 자신들은 다른 방법으로 자신들을 지키는 것이 낫다고 주장하고 있습니다."
